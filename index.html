<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Studio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="container">
        <h1>AI Video Studio</h1>
        
        <div id="ui-input">
            <textarea id="ai-prompt" placeholder="Sher jungle me shikar kar raha hai..." rows="4"></textarea>
            <button id="btn-generate">Generate Video</button>
        </div>

        <div id="ui-result" style="display:none;">
            <div class="loader">Generating your video...</div>
            <video id="final-video" controls playsinline></video>
            <button id="btn-download">Download MP4</button>
            <button id="btn-back">Create New</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
